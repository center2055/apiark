name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ── Create GitHub Release ─────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ApiArk ${tag}`,
              body: `## ApiArk ${tag}\n\nDownload the installer for your platform below.\n\n### Installation\n- **Windows**: Download \`.msi\` or \`.exe\` installer\n- **macOS**: Download \`.dmg\` (Apple Silicon) or \`.dmg\` (Intel)\n- **Linux**: Download \`.AppImage\`, \`.deb\`, or \`.rpm\`\n\n---\n*Full changelog: https://github.com/${{ github.repository }}/compare/...${tag}*`,
              draft: true,
              prerelease: tag.includes('-beta') || tag.includes('-rc') || tag.includes('-alpha'),
            });
            return data.id;

  # ── Build Desktop App (per-platform) ──────────────────────────────────
  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64

          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64

          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ matrix.label }}-cargo-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.label }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm -C apps/desktop exec tsc --noEmit

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}
          updaterJsonPreferNsis: true

  # ── Build CLI (per-platform) ──────────────────────────────────────────
  build-cli:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            ext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            ext: ".exe"
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            ext: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x86_64
            ext: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/cli/target
          key: cli-${{ matrix.label }}-${{ hashFiles('apps/cli/Cargo.lock') }}

      - name: Build CLI
        working-directory: apps/cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="apps/cli/target/${{ matrix.target }}/release/apiark${{ matrix.ext }}"
          dst="apiark-cli-${{ matrix.label }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - name: Upload CLI to release
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = 'apiark-cli-${{ matrix.label }}${{ matrix.ext }}';
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: path,
              data: fs.readFileSync(path),
            });

  # ── Publish Release ───────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-desktop, build-cli]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (undraft)
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
